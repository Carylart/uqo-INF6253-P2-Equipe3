version: '3.8'

services:
  triplestore:
    build: .
    ports:
      - "3030:3030"
    volumes:
      - ./data:/opt/fuseki/data
      - ./logs:/opt/fuseki/logs
    environment:
      - FUSEKI_DATASET_NAME=go_evolution
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped